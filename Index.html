<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>Tinho 4.0 - Chatbot Inteligente</title>
    <style>
        :root {
            --bg: #f0f4f0;
            --header-bg: #2e7d32;
            --header-text: #ffffff;
            --bot-bg: #e8f5e9;
            --bot-text: #1b5e20;
            --user-bg: #c8e6c9;
            --user-text: #1b5e20;
            --input-bg: #ffffff;
            --border: #a5d6a7;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2f1, #c8e6c9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: var(--bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        /* Cabeçalho */
        .chat-header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #1b5e20;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .chat-header .avatar {
            font-size: 2.2rem;
            background: #fff;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .chat-header .title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .chat-header .subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
            font-weight: 300;
        }

        /* Área de mensagens */
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f9fdf9;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 80%;
            animation: fadeInUp 0.4s ease-out;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message .bubble {
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            position: relative;
        }

        .message.user .bubble {
            background: var(--user-bg);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: #ffffff;
            border: 1px solid #c8e6c9;
            color: #1b5e20;
            border-bottom-left-radius: 4px;
        }

        .message .avatar-icon {
            font-size: 1.8rem;
        }

        /* Indicador de digitação */
        .typing-indicator {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #c8e6c9;
            margin-bottom: 8px;
            animation: fadeInUp 0.3s ease-out;
        }

        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: #81c784;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.3); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Área de entrada */
        .chat-input-area {
            display: flex;
            padding: 14px 16px;
            background: #ffffff;
            border-top: 2px solid var(--border);
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #c8e6c9;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            background: #f9fdf9;
        }

        .chat-input-area input:focus {
            border-color: #66bb6a;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }

        .chat-input-area button {
            background: var(--header-bg);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .chat-input-area button:hover {
            background: #1b5e20;
            transform: scale(1.05);
        }

        /* Scrollbar estilizado */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #a5d6a7;
            border-radius: 8px;
        }
    </style>
</head>

            // Conhecimento em memória (merge base + aprendido)
            let learnedKnowledge = {}; // carregado do localStorage
            let knowledge = {};

            // ========== FUNÇÕES DE UTILIDADE ==========
            function loadLearned() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) learnedKnowledge = JSON.parse(saved);
                } catch (e) {
                    learnedKnowledge = {};
                }
            }

            function saveLearned() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(learnedKnowledge));
            }

            function rebuildKnowledge() {
                knowledge = Object.assign({}, baseDialogos, learnedKnowledge);
            }

            function getResponse(key) {
                let entry = knowledge[key];
                if (!entry) return null;
                if (Array.isArray(entry)) {
                    return entry[Math.floor(Math.random() * entry.length)];
                }
                return entry;
            }

            // Levenshtein distance
            function levenshteinDistance(a, b) {
                const m = a.length, n = b.length;
                const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
                for (let i = 0; i <= m; i++) dp[i][0] = i;
                for (let j = 0; j <= n; j++) dp[0][j] = j;
                for (let i = 1; i <= m; i++) {
                    for (let j = 1; j <= n; j++) {
                        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                        dp[i][j] = Math.min(
                            dp[i - 1][j] + 1,
                            dp[i][j - 1] + 1,
                            dp[i - 1][j - 1] + cost
                        );
                    }
                }
                return dp[m][n];
            }

            function similarity(a, b) {
                if (a.length === 0 && b.length === 0) return 1;
                const dist = levenshteinDistance(a, b);
                const maxLen = Math.max(a.length, b.length);
                return 1 - dist / maxLen;
            }

            function fuzzyMatch(input) {
                let bestKey = null;
                let bestScore = 0;
                for (let key in knowledge) {
                    const score = similarity(input, key);
                    if (score > bestScore) {
                        bestScore = score;
                        bestKey = key;
                    }
                }
                if (bestScore >= 0.65) return bestKey;
                return null;
            }

            // ========== INTERFACE DO CHAT ==========
            function addMessage(text, sender, animate = true) {
                const div = document.createElement('div');
                div.className = `message ${sender}`;
                const avatarIcon = sender === 'bot' ? '<span class="avatar-icon">🦜</span>' : '<span class="avatar-icon">😃</span>';
                const bubble = `<div class="bubble">${text}</div>`;
                div.innerHTML = sender === 'user' ? bubble + avatarIcon : avatarIcon + bubble;
                if (!animate) div.style.animation = 'none';
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                return div;
            }

            function showTypingIndicator() {
                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.id = 'typingIndicator';
                indicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
                chatMessages.appendChild(indicator);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function removeTypingIndicator() {
                const ind = document.getElementById('typingIndicator');
                if (ind) ind.remove();
            }

            function botReply(text, stateAfter = null, delay = 800) {
                showTypingIndicator();
                setTimeout(() => {
                    removeTypingIndicator();
                    addMessage(text, 'bot');
                    if (stateAfter) currentState = stateAfter;
                }, delay);
            }

            // ========== PROCESSAMENTO DE COMANDOS ==========
            function processInput(input) {
                input = input.trim();
                if (input === '') return;

                addMessage(input, 'user');

                // Modo jogo
                if (currentState === STATE.JOGANDO) {
                    if (input === 'cancelar') {
                        botReply('Jogo cancelado! Voltando ao normal. 🦜', STATE.NORMAL);
                        return;
                    }
                    const guess = parseInt(input);
                    if (isNaN(guess) || guess < 1 || guess > 5) {
                        botReply('Isso não é um número entre 1 e 5. Tente novamente ou digite "cancelar".');
                        return;
                    }
                    if (guess === secretNumber) {
                        botReply(`Parabéns! Você acertou! Era ${secretNumber}. 🎉`, STATE.NORMAL);
                    } else {
                        botReply(`Errou! O número era ${secretNumber}. Tente novamente com "jogar".`, STATE.NORMAL);
                    }
                    return;
                }

                // Modo aprendizado
                if (currentState === STATE.APRENDENDO) {
                    if (input === 'cancelar') {
                        botReply('Aprendizado cancelado. Voltando ao normal. 📚', STATE.NORMAL);
                        return;
                    }
                    // Aprende nova resposta
                    knowledge[unknownQuery] = input;
                    learnedKnowledge[unknownQuery] = input;
                    saveLearned();
                    botReply('Aprendi! Pruuu! Obrigado por me ensinar. 🧠', STATE.NORMAL);
                    return;
                }

                // Comandos especiais (state NORMAL)
                const cmd = input.toLowerCase();
                if (cmd === 'sair') {
                    botReply('Tchau! Foi bom falar com você. (Feche a aba para sair) 👋');
                    return;
                }
                if (cmd === 'reset' || cmd === 'apagar memória' || cmd === 'limpar memória') {
                    learnedKnowledge = {};
                    saveLearned();
                    rebuildKnowledge();
                    botReply('Memória apagada! Voltamos ao conhecimento básico. 🧹');
                    return;
                }
                // Jogo de adivinhação
                if (cmd === 'jogar' || cmd === 'adivinhação' || cmd === 'advinha') {
                    secretNumber = Math.floor(Math.random() * 5) + 1;
                    currentState = STATE.JOGANDO;
                    botReply('Pensei em um número de 1 a 5! Tente adivinhar. (Ou "cancelar" para sair)');
                    return;
                }

                // Busca exata no conhecimento
                const exactResponse = getResponse(cmd);
                if (exactResponse) {
                    botReply(exactResponse);
                    return;
                }

                // Fuzzy matching
                const fuzzyKey = fuzzyMatch(cmd);
                if (fuzzyKey) {
                    const resp = getResponse(fuzzyKey);
                    botReply(resp);
                    return;
                }

                // Não entendeu -> modo aprendizado
                unknownQuery = cmd;
                currentState = STATE.APRENDENDO;
                botReply(`🤔 Ainda não sei responder isso. O que devo responder quando alguém disser "${cmd}"? (ou "cancelar")`);
            }

            // ========== INICIALIZAÇÃO ==========
            function init() {
                loadLearned();
                rebuildKnowledge();
                addMessage('🦜 TINHO 4.0 ONLINE! Olá, estou vivo e pronto para conversar. Digite "ajuda" para ver o que posso fazer.', 'bot', false);
            }

            // Eventos
            sendBtn.addEventListener('click', () => {
                const text = userInput.value;
                userInput.value = '';
                processInput(text);
            });

            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const text = userInput.value;
                    userInput.value = '';
                    processInput(text);
                }
            });

            init();
        })();
