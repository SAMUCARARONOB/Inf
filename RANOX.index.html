<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANOX – IA Definitiva</title>
    <style>
        :root {
            --bg-deep: #06060e;
            --panel-glass: rgba(12, 12, 22, 0.82);
            --header-glass: rgba(8, 8, 20, 0.88);
            --primary: #ff3b3b;
            --primary-soft: #ff5555;
            --accent: #8b5cf6;
            --accent-glow: #a78bfa;
            --user-bub: rgba(30, 15, 30, 0.78);
            --bot-bub: rgba(16, 16, 28, 0.78);
            --border: rgba(255, 255, 255, 0.05);
            --text: #e4e4ec;
            --text-secondary: #a0a0b8;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 26px;
            --shadow-md: 0 8px 24px rgba(0,0,0,0.55);
            --shadow-glow: 0 0 45px rgba(255, 50, 50, 0.18);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; }
        body {
            font-family: var(--font);
            background: var(--bg-deep);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; position: relative;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 60, 60, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(100, 100, 255, 0.03) 0%, transparent 60%);
        }
        .particles-canvas {
            position: fixed; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 0; opacity: 0.4;
        }
        .chat-container {
            position: absolute; width: 520px; height: 640px;
            min-width: 370px; min-height: 460px;
            background: var(--panel-glass);
            backdrop-filter: blur(26px);
            -webkit-backdrop-filter: blur(26px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md), var(--shadow-glow), inset 0 1px 0 rgba(255,255,255,0.03);
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid var(--border);
            resize: both;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2; animation: containerAppear 0.5s ease-out;
        }
        @keyframes containerAppear {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.93); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .chat-header {
            background: var(--header-glass); backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px); padding: 14px 20px;
            display: flex; align-items: center; gap: 14px;
            border-bottom: 1px solid var(--border); cursor: move; z-index: 5; user-select: none;
        }
        .chat-header .logo {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255, 50, 50, 0.1); border-radius: 50%;
            border: 1.5px solid rgba(255, 80, 80, 0.4); font-size: 1.3rem;
            box-shadow: 0 0 18px rgba(255, 50, 50, 0.22);
            animation: logoGlow 3s infinite; transition: var(--transition-fast);
        }
        @keyframes logoGlow { 0%,100%{box-shadow:0 0 14px rgba(255,50,50,0.18);} 50%{box-shadow:0 0 28px rgba(255,50,50,0.42);} }
        .chat-header .info { flex:1; display: flex; flex-direction: column; }
        .chat-header .title { font-weight: 700; font-size: 1.15rem; color: #fff; letter-spacing: 0.5px; }
        .chat-header .status { font-size: 0.7rem; color: #ff9999; display: flex; align-items: center; gap: 5px; }
        .chat-header .status .dot { width:6px; height:6px; background:#ff6666; border-radius:50%; animation:statusPulse 2s infinite; }
        @keyframes statusPulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
        .chat-header .btns { display: flex; gap: 8px; }
        .chat-header .btns button {
            width: 34px; height: 34px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.03); color: #ccc; cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition-fast); backdrop-filter: blur(6px);
        }
        .chat-header .btns button:hover {
            background: rgba(255,255,255,0.1); color: #fff;
            border-color: rgba(255,255,255,0.16); box-shadow: 0 0 14px rgba(255,50,50,0.2);
        }
        .chat-messages {
            flex: 1; padding: 16px 18px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .message {
            display: flex; flex-direction: column; max-width: 87%;
            animation: msgSlideIn 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        @keyframes msgSlideIn {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .message.user { align-self: flex-end; }
        .message.bot { align-self: flex-start; }
        .message .bubble {
            padding: 10px 16px; border-radius: var(--radius-md);
            font-size: 0.88rem; line-height: 1.55; word-wrap: break-word; position: relative;
        }
        .message.user .bubble {
            background: var(--user-bub); color: #f0d0d0;
            border-bottom-right-radius: 6px; border: 1px solid rgba(255,255,255,0.05);
        }
        .message.bot .bubble {
            background: var(--bot-bub); color: #d8d8e8;
            border: 1px solid rgba(255,255,255,0.04); border-bottom-left-radius: 6px;
        }
        .message .bubble img { max-width: 200px; border-radius: 12px; margin-top: 8px; display: block; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .message .bubble .copy-btn {
            position: absolute; top: 6px; right: 6px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            color: #ccc; border-radius: 6px; padding: 3px 8px; font-size: 0.65rem;
            cursor: pointer; transition: var(--transition-fast); display: none;
        }
        .message .bubble:hover .copy-btn { display: block; }
        .message .bubble .copy-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .message .role-label {
            font-size: 0.68rem; font-weight: 600; margin-bottom: 3px; opacity: 0.7; letter-spacing: 0.3px;
        }
        .message.user .role-label { color: #ff7777; text-align: right; }
        .message.bot .role-label { color: #a78bfa; }
        .typing-indicator {
            align-self: flex-start; background: var(--bot-bub); padding: 12px 18px;
            border-radius: var(--radius-md); display: flex; gap: 5px; align-items: center;
            border: 1px solid rgba(255,255,255,0.04); animation: msgSlideIn 0.3s ease;
        }
        .typing-indicator .dot {
            width: 7px; height: 7px; background: var(--accent); border-radius: 50%;
            animation: dotBounce 1.3s infinite; box-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
        }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.36s; }
        @keyframes dotBounce { 0%,80%,100%{transform:scale(0.55);opacity:0.3;} 40%{transform:scale(1.25);opacity:1;} }
        .input-area {
            padding: 12px 18px; background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center;
        }
        .input-area input {
            flex: 1; padding: 11px 18px; border-radius: 26px;
            border: 1.5px solid rgba(255,255,255,0.07); background: rgba(20, 20, 35, 0.6);
            color: #f0d0d0; font-size: 0.9rem; outline: none;
            transition: var(--transition-smooth); backdrop-filter: blur(4px);
        }
        .input-area input:focus {
            border-color: var(--primary-soft);
            box-shadow: 0 0 20px rgba(255, 60, 60, 0.2), 0 0 4px rgba(255, 80, 80, 0.3);
            background: rgba(25, 25, 40, 0.75);
        }
        .input-area input::placeholder { color: #5a4a4a; }
        .input-area button {
            width: 42px; height: 42px; border-radius: 50%;
            border: 1.5px solid rgba(255, 80, 80, 0.5); background: rgba(255, 50, 50, 0.08);
            color: #ff6666; font-size: 1.2rem; cursor: pointer;
            transition: var(--transition-smooth); display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .input-area button:hover {
            background: rgba(255, 50, 50, 0.2); border-color: var(--primary); color: #fff;
            box-shadow: 0 0 22px rgba(255, 50, 50, 0.4); transform: scale(1.04);
        }
        .float-btn {
            position: fixed; bottom: 26px; right: 26px; width: 50px; height: 50px; border-radius: 50%;
            background: rgba(20, 10, 20, 0.85); backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 70, 70, 0.5); color: #ff5555; font-size: 20px; cursor: pointer;
            z-index: 9999; box-shadow: 0 0 24px rgba(255, 40, 40, 0.35);
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition-smooth); animation: floatPulse 2.5s infinite;
        }
        @keyframes floatPulse { 0%,100%{box-shadow:0 0 20px rgba(255,40,40,0.3);} 50%{box-shadow:0 0 35px rgba(255,40,40,0.55);} }
        .float-btn:hover {
            background: rgba(255, 50, 50, 0.2); color: #fff;
            box-shadow: 0 0 30px rgba(255, 50, 50, 0.6); transform: scale(1.06);
        }
        @media (max-width: 540px) {
            .chat-container {
                width: 100vw !important; height: 100vh !important; border-radius: 0; resize: none;
                position: fixed; top: 0 !important; left: 0 !important; transform: none !important;
            }
            .chat-header { cursor: default; }
            .float-btn { bottom: 16px; right: 16px; width: 44px; height: 44px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <canvas class="particles-canvas" id="particlesCanvas"></canvas>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="logo">⚡</div>
            <div class="info">
                <div class="title">RANOX</div>
                <div class="status"><span class="dot"></span> Online</div>
            </div>
            <div class="btns">
                <button id="btnNew" title="Novo Chat">+</button>
                <button id="btnClose" title="Minimizar">−</button>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendBtn">▶</button>
        </div>
    </div>

    <button class="float-btn" id="floatBtn" style="display:none;" title="Abrir RANOX">⚡</button>

    <script>
    (function() {
        // ==================== ELEMENTOS DOM ====================
        const chatContainer = document.getElementById('chatContainer');
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const btnNew = document.getElementById('btnNew');
        const btnClose = document.getElementById('btnClose');
        const chatHeader = document.getElementById('chatHeader');
        const floatBtn = document.getElementById('floatBtn');
        const particlesCanvas = document.getElementById('particlesCanvas');
        const ctx = particlesCanvas.getContext('2d');

        // ==================== PARTÍCULAS ====================
        let particlesArray = [];
        function resizeCanvas() { particlesCanvas.width = window.innerWidth; particlesCanvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * particlesCanvas.width;
                this.y = Math.random() * particlesCanvas.height;
                this.size = Math.random() * 1.8 + 0.4;
                this.speedY = Math.random() * 0.22 + 0.07;
                this.speedX = (Math.random() - 0.5) * 0.14;
                this.opacity = Math.random() * 0.5 + 0.15;
                this.pulseSpeed = Math.random() * 0.014 + 0.005;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }
            update() {
                this.y -= this.speedY; this.x += this.speedX;
                this.opacity = 0.25 + Math.sin(Date.now() * this.pulseSpeed + this.pulseOffset) * 0.2;
                if (this.y < -10) { this.y = particlesCanvas.height + 10; this.x = Math.random() * particlesCanvas.width; }
                if (this.x < -10) this.x = particlesCanvas.width + 10;
                if (this.x > particlesCanvas.width + 10) this.x = -10;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,70,70,${Math.max(0,Math.min(0.6,this.opacity))})`; ctx.fill();
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size*2.5, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,50,50,${Math.max(0,Math.min(0.14,this.opacity*0.28))})`; ctx.fill();
            }
        }
        for (let i=0;i<75;i++) particlesArray.push(new Particle());
        function animateParticles() {
            ctx.clearRect(0,0,particlesCanvas.width,particlesCanvas.height);
            particlesArray.forEach(p=>{p.update();p.draw();});
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ==================== ESTADO ====================
        const STORAGE_KEY = 'ranox_definitive_v2';
        let isTyping = false, gameMode = null, secretNumber = null;
        let memory = [], lastTopic = null, internetCache = {};

        function saveState() {
            const msgs = []; chatMessages.querySelectorAll('.message').forEach(msg => {
                const isUser = msg.classList.contains('user');
                const bubble = msg.querySelector('.bubble');
                if (bubble) { const text = bubble.innerHTML.replace(/<div class="role-label">.*?<\/div>/g,'').replace(/<br><img.*?>/g,'').replace(/<button.*?<\/button>/g,''); msgs.push({role:isUser?'user':'bot',content:text}); }
            });
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify({messages:msgs,memory,lastTopic,internetCache,gameMode,secretNumber})); } catch(e) {}
        }
        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const state = JSON.parse(saved); memory=state.memory||[]; lastTopic=state.lastTopic||null;
                    internetCache=state.internetCache||{}; gameMode=state.gameMode||null; secretNumber=state.secretNumber||null;
                    if (state.messages?.length) { state.messages.forEach(m=>addMessageDirect(m.content,m.role)); return true; }
                }
            } catch(e) {}
            return false;
        }

        // ==================== CONVERSOR DE ROMANOS ====================
        const romanMap = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
        function toRoman(num) {
            if (num<=0||num>=4000000) return null;
            if (num>=4000) return '('+toRoman(Math.floor(num/1000))+')'+(num%1000>0?toRoman(num%1000):'');
            let r='', n=num; for (let [v,s] of romanMap) while(n>=v){r+=s;n-=v;} return r;
        }
        function fromRoman(r) {
            const vals={I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
            const paren=r.match(/^\(([IVXLCDM]+)\)(.*)/);
            if (paren) return fromRoman(paren[1])*1000 + (paren[2]?fromRoman(paren[2]):0);
            let t=0, prev=0; for(let i=r.length-1;i>=0;i--){const v=vals[r[i]]||0; t+=v<prev?-v:v; prev=v;} return t||null;
        }

        function detectRomanQuery(input) {
            const l=input.toLowerCase().trim();
            const patterns=[/^(\d+)\s*(?:em|para)?\s*(?:n[úu]meros?\s*)?roman[oa]s?\s*$/i,/^(\d+)\s*(?:em|para)?\s*(?:algarismos?\s*)?roman[oa]s?\s*$/i,/^(?:n[úu]mero|algarismo)\s*roman[oa]\s*(\d+)\s*$/i,/^roman[oa]\s*(\d+)\s*$/i,/^(?:qual|como)\s*(?:é|e|eh)\s*(\d+)\s*(?:em|para)?\s*(?:n[úu]meros?\s*)?roman[oa]s?\s*$/i,/^(?:me\s*)?(?:diga|fala|diz)\s*(?:ai\s*)?(?:quanto[s]?\s*(?:é|e|eh)\s*)?(\d+)\s*(?:em|para)?\s*(?:n[úu]meros?\s*)?roman[oa]s?\s*$/i,/^(\d+)\s*(?:em|para)?\s*romano\s*$/i,/^(\d+)\s*romano\s*$/i];
            for(let p of patterns){const m=input.match(p); if(m&&m[1]){const n=parseInt(m[1]); if(!isNaN(n)&&n>0&&n<4000000)return{type:'toRoman',num:n};}}
            const fromPats=[/^([IVXLCDM]+)\s*(?:em|para)?\s*(?:n[úu]mero|decimal|inteiro)\s*$/i,/^(?:qual|que)\s*(?:n[úu]mero|valor)\s*(?:é|e|eh)\s*([IVXLCDM]+)\s*$/i,/^(?:n[úu]mero\s*)?roman[oa]\s*([IVXLCDM]+)\s*$/i,/^([IVXLCDM]+)\s*$/i];
            for(let p of fromPats){const m=input.match(p); if(m&&m[1]&&/^[IVXLCDM]+$/i.test(m[1])){const n=fromRoman(m[1].toUpperCase()); if(n)return{type:'fromRoman',roman:m[1].toUpperCase(),num:n};}}
            const parenP=/^\(([IVXLCDM]+)\)\s*(?:em|para)?\s*(?:n[úu]mero|decimal)?\s*$/i; const pm=input.match(parenP);
            if(pm){const n=fromRoman(pm[1])*1000; if(n)return{type:'fromRoman',roman:'('+pm[1].toUpperCase()+')',num:n};}
            return null;
        }

        // ==================== GERADOR DE LISTAS ====================
        function generateRomanList(start, end) {
            if (start<1||end>3999999||start>end) return null;
            let result = `📜 <b>Números Romanos de ${start} a ${end}:</b>\n\n`;
            for (let i=start; i<=end; i++) result += `${i} → ${toRoman(i)}\n`;
            return result;
        }
        function generateMultiplicationTable(num, upTo=10) {
            let result = `✖️ <b>Tabuada do ${num}:</b>\n\n`;
            for (let i=1; i<=upTo; i++) result += `${num} × ${i} = ${num*i}\n`;
            return result;
        }
        function generatePrimeNumbers(upTo) {
            if (upTo<2||upTo>100000) return null;
            const primes = []; const sieve = Array(upTo+1).fill(true); sieve[0]=sieve[1]=false;
            for (let i=2; i<=Math.sqrt(upTo); i++) if (sieve[i]) for (let j=i*i; j<=upTo; j+=i) sieve[j]=false;
            for (let i=2; i<=upTo; i++) if (sieve[i]) primes.push(i);
            return `🔢 <b>Números primos até ${upTo}:</b>\n\n${primes.join(', ')}`;
        }
        function detectGenerationRequest(input) {
            const l = input.toLowerCase().trim();
            const rangePatterns = [
                /(?:me\s*)?(?:fa[çc]a|gere|crie|escreva|mande|envie|mostre|exiba|fala|fale|diga|liste)\s*(?:um\s*)?(?:prompt|lista|texto|tabela)?\s*(?:de|com|da|dos)?\s*(?:n[úu]meros?\s*(?:em|para)?\s*)?roman[oa]s?\s*(?:de|do|desde|entre)?\s*(\d+)\s*(?:a[té]|até|a|—|-)\s*(\d+)/i,
                /(?:me\s*)?(?:mande|envie|mostre|exiba|liste|gere|crie|fa[çc]a|fala|fale|diga)\s*(?:os?\s*)?(?:n[úu]meros?\s*(?:em|para)?\s*)?roman[oa]s?\s*(?:de|do|desde|entre)?\s*(\d+)\s*(?:a[té]|até|a|—|-)\s*(\d+)/i,
                /(?:me\s*)?(?:d[êe]|me\s*d[êe])\s*(?:os?\s*)?(?:n[úu]meros?\s*(?:em|para)?\s*)?roman[oa]s?\s*(?:de|do|desde|entre)?\s*(\d+)\s*(?:a[té]|até|a|—|-)\s*(\d+)/i,
                /(?:lista|prompt|tabela|gerar|escrever|mostrar|exibir|falar|dizer)\s*(?:de|com|da|dos)?\s*(?:n[úu]meros?\s*(?:em|para)?\s*)?roman[oa]s?\s*(?:de|do|desde|entre)?\s*(\d+)\s*(?:a[té]|até|a|—|-)\s*(\d+)/i,
                /(?:me\s*)?(?:pode|poderia)\s*(?:me\s*)?(?:mandar|enviar|mostrar|exibir|gerar|criar|fazer|falar|dizer)\s*(?:um\s*)?(?:prompt|lista|texto|tabela)?\s*(?:de|com|da|dos)?\s*(?:n[úu]meros?\s*(?:em|para)?\s*)?roman[oa]s?\s*(?:de|do|desde|entre)?\s*(\d+)\s*(?:a[té]|até|a|—|-)\s*(\d+)/i,
                /(?:de|desde|entre)\s*(\d+)\s*(?:a[té]|até|a|—|-)\s*(\d+)\s*(?:em|para)?\s*(?:n[úu]meros?\s*)?roman[oa]s?\s*$/i,
                /^(\d+)\s*(?:a[té]|até|a|—|-)\s*(\d+)\s*(?:em|para)?\s*(?:n[úu]meros?\s*)?roman[oa]s?\s*$/i,
                /(?:fala|fale|diga|liste|mostre|exiba)\s*(?:aí|ai)?\s*(?:de|do|desde|entre)?\s*(\d+)\s*(?:a[té]|até|a|—|-)\s*(\d+)\s*(?:em|para)?\s*(?:n[úu]meros?\s*)?roman[oa]s?\s*$/i
            ];
            for(let p of rangePatterns){
                const m = l.match(p);
                if(m && m[1] && m[2]){ const start=parseInt(m[1]),end=parseInt(m[2]); if(!isNaN(start)&&!isNaN(end)&&start>0&&end<4000000&&start<=end) return { type: 'romanList', start, end }; }
            }

        function generateTopList(categoryKey, count) {
    // categoryKey é a chave normalizada (ex: "animais mais rapidos")
    const list = listDatabase[categoryKey];
    if (!list) return null;
    
    const total = list.length;
    const n = Math.min(count, total);
    if (n <= 0) return null;
    
    let result = `🔝 <b>Top ${n} ${categoryKey.replace(/\b\w/g, l => l.toUpperCase())}:</b>\n\n`;
    for (let i = 0; i < n; i++) {
        result += `${i+1}. ${list[i]}\n`;
    }
    if (count > total) {
        result += `\n⚠️ Só existem ${total} itens nessa lista.`;
    }
    return result;
        }

    // CONTAGEM REGRESSIVA
    {patterns:['quantos dias até','dias até','contagem regressiva para'],
     handler: (input) => {
        const match = input.match(/(?:para|até|pro|proa)\s+(.+)/i);
        if (!match) return 'Para qual evento?';
        const eventDate = new Date(match[1]);
        if (isNaN(eventDate.getTime())) return 'Não entendi a data. Use formato como "2025-12-25".';
        const diff = Math.ceil((eventDate - new Date()) / (1000 * 60 * 60 * 24));
        return diff > 0 ? `Faltam ${diff} dias!` : 'Essa data já passou!';
     }},

        // ==================== NORMALIZADOR ====================
        function normalize(s) {
            let t = s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
            const exp={'vc':'voce','cê':'voce','td':'tudo','blz':'beleza','vlw':'valeu','obg':'obrigado','mt':'muito','tlgd':'to ligado','pprt':'papo reto','pdp':'pode pa','slk':'seloko','ctz':'certeza','sla':'sei la','tmj':'tamo junto','fds':'fim de semana','eai':'e ai','iae':'e ai','eaee':'e ai','eae':'e ai','oiiie':'oi','ola':'oi','oie':'oi','oii':'oi','hello':'oi','hey':'oi','salve':'oi','vamo':'vamos','bora':'vamos','partiu':'vamos','mano':'','brother':'','cara':'','véi':'','mermao':'','patrao':'','chefe':'','oque':'o que','oquee':'o que','oq':'o que','pq':'por que','q':'que','k':'que','tb':'tambem','tbm':'tambem','ñ':'nao','nao':'nao','nn':'nao','n':'nao'};
            for (let [k,v] of Object.entries(exp)) t = t.replace(new RegExp('\\b'+k+'\\b','g'), v);
            return t.replace(/\s+/g,' ').trim();
        }
        function levenshtein(a,b){const m=a.length,n=b.length;const dp=Array(m+1).fill().map(()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return dp[m][n];}
        function similarity(a,b){return 1-levenshtein(a,b)/Math.max(a.length,b.length);}

        function solveMath(text) {
            let t=text.toLowerCase().trim().replace(/\bdividido por\b/g,'/').replace(/\bdividido\b/g,'/').replace(/\bdivisão\b/g,'/').replace(/\bdivisao\b/g,'/').replace(/\bvezes\b/g,'*').replace(/\bmultiplicado por\b/g,'*').replace(/\bmais\b/g,'+').replace(/\bmenos\b/g,'-').replace(/\belevado a\b/g,'^').replace(/[×x]/g,'*').replace(/÷/g,'/').replace(/\s+/g,'').replace(/quantos?e|quanto[s]?e|calcule|mediga|fala|resolve/g,'');
            const rm=/raizquadrada(?:de)?(\d+(\.\d+)?)/.exec(t); if(rm){const n=parseFloat(rm[1]);if(!isNaN(n)&&n>=0)return`√${n} = <b>${Math.sqrt(n).toFixed(4)}</b>`;}
            const em=t.match(/(\d+(\.\d+)?)([\+\-\*\/\^])(\d+(\.\d+)?)/); if(em){const a=parseFloat(em[1]),op=em[3],b=parseFloat(em[4]);if(isNaN(a)||isNaN(b))return null;let r;switch(op){case'+':r=a+b;break;case'-':r=a-b;break;case'*':r=a*b;break;case'/':r=b!==0?a/b:'indefinido';break;case'^':r=Math.pow(a,b);break;default:return null;}return`🧮 ${a} ${op} ${b} = <b>${Number.isInteger(r)?r:parseFloat(r.toFixed(4))}</b>`;}
            return null;
        }

        // ==================== BUSCA NA INTERNET (MÚLTIPLOS FALLBACKS) ====================
        async function searchWikipedia(query, lang='pt') {
            const cacheKey = `wiki_${lang}_${query}`;
            if (internetCache[cacheKey]) return internetCache[cacheKey];
            try {
                const url = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();
                if (data.type === 'disambiguation' || !data.extract) return null;
                internetCache[cacheKey] = data.extract.substring(0, 1000);
                return internetCache[cacheKey];
            } catch(e) { return null; }
        }

        async function searchDuckDuckGo(query) {
            const cacheKey = `ddg_${query}`;
            if (internetCache[cacheKey]) return internetCache[cacheKey];
            try {
                const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('DDG error');
                const data = await res.json();
                if (data.AbstractText && data.AbstractText.length > 20) {
                    internetCache[cacheKey] = data.AbstractText.substring(0, 1000);
                    return internetCache[cacheKey];
                }
                if (data.Answer && data.Answer.length > 5) { internetCache[cacheKey] = data.Answer; return data.Answer; }
                if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                    const first = data.RelatedTopics[0];
                    if (first.Text) { internetCache[cacheKey] = first.Text.substring(0, 1000); return internetCache[cacheKey]; }
                }
                return null;
            } catch(e) { return null; }
        }

        async function searchFullWikipediaArticle(query, lang='pt') {
            const cacheKey = `wiki_full_${lang}_${query}`;
            if (internetCache[cacheKey]) return internetCache[cacheKey];
            try {
                const url = `https://${lang}.wikipedia.org/w/api.php?origin=*&format=json&action=query&prop=extracts&exlimit=1&explaintext=1&exsectionformat=plain&titles=${encodeURIComponent(query)}`;
                const res = await fetch(url);
                const data = await res.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                if (pageId === '-1' || !pages[pageId].extract) return null;
                const extract = pages[pageId].extract.substring(0, 2000);
                internetCache[cacheKey] = extract;
                return extract;
            } catch(e) { return null; }
        }

        async function smartWebSearch(query) {
            const ck = normalize(query);
            if (internetCache[ck]) return internetCache[ck];

            let searchTerm = query;
            const howTopic = extractHowToQuery(query);
            if (howTopic) {
                searchTerm = `como fazer ${howTopic}`;
                const enTerm = `how to ${howTopic}`;
                let answer = await searchWikipedia(enTerm, 'en');
                if (answer) return answer;
                answer = await searchDuckDuckGo(enTerm);
                if (answer) return answer;
            }

            const dq = extractDefinitionQuery(query);
            const st = dq || searchTerm;

            // Fallback sequencial
            let answer = await searchWikipedia(st, 'pt');
            if (answer) return answer;
            answer = await searchWikipedia(st, 'en');
            if (answer) return answer;
            answer = await searchDuckDuckGo(st);
            if (answer) return answer;
            answer = await searchFullWikipediaArticle(st, 'pt');
            if (answer) return answer;
            answer = await searchFullWikipediaArticle(st, 'en');
            if (answer) return answer;
            // Tenta busca genérica no DuckDuckGo com o termo original
            answer = await searchDuckDuckGo(query);
            if (answer) return answer;
            // Última tentativa: busca em inglês no DuckDuckGo
            answer = await searchDuckDuckGo(st + ' ' + query);
            if (answer) return answer;

            return null;
        }

        // ==================== INTERFACE ====================
        function addMessageDirect(text,role){const div=document.createElement('div');div.className=`message ${role}`;const label=role==='user'?'Você':'RANOX';div.innerHTML=`<div class="role-label">${label}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;div.style.animation='none';chatMessages.appendChild(div);chatMessages.scrollTop=chatMessages.scrollHeight;}
        function addMessage(text,role,imageUrl=null,isLong=false){const div=document.createElement('div');div.className=`message ${role}`;const label=role==='user'?'Você':'RANOX';let c=text.replace(/\n/g,'<br>');if(imageUrl)c+=`<br><img src="${imageUrl}" alt="Imagem" onerror="this.style.display='none'">`;if(isLong||c.length>300){c+=`<button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.textContent.replace('📋','').trim()).then(()=>{this.textContent='✅ Copiado!';setTimeout(()=>this.textContent='📋',2000)})">📋</button>`;}div.innerHTML=`<div class="role-label">${label}</div><div class="bubble">${c}</div>`;chatMessages.appendChild(div);chatMessages.scrollTop=chatMessages.scrollHeight;saveState();return div.querySelector('.bubble');}
        function showTyping(){const ind=document.createElement('div');ind.className='typing-indicator';ind.id='typing';ind.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';chatMessages.appendChild(ind);chatMessages.scrollTop=chatMessages.scrollHeight;}
        function hideTyping(){const el=document.getElementById('typing');if(el)el.remove();}

        // ==================== PROCESSAMENTO PRINCIPAL ====================
        async function processInput(input){
            input=input.trim();if(!input)return;
            addMessage(input,'user');addToMemory(input,'','user');

            if(/^(o que (eu )?(já )?perguntei|histórico|memoria|memory|lembrar)/i.test(input)){const m=getMemory();addMessage(m,'bot');addToMemory(input,m,'bot');return;}

            if(gameMode==='guess'){
                if(input.toLowerCase()==='cancelar'){gameMode=null;addMessage('Jogo cancelado.','bot');saveState();return;}
                const g=parseInt(input);if(isNaN(g)||g<1||g>5){addMessage('Número entre 1 e 5 ou "cancelar".','bot');return;}
                const msg=g===secretNumber?`🎉 Acertou! Era ${secretNumber}!`:`Errou! Era ${secretNumber}.`;
                addMessage(msg,'bot');addToMemory(input,msg,'bot');gameMode=null;saveState();return;
            }

            const cmd=input.toLowerCase();
            if(cmd==='sair'){const m='Tchau! Até mais! 👋';addMessage(m,'bot');addToMemory(input,m,'bot');saveState();return;}
            if(cmd==='reset'){memory=[];lastTopic=null;internetCache={};chatMessages.innerHTML='';addMessage('⚡ Memória e cache limpos!','bot');saveState();return;}
            if(cmd==='jogar'||cmd==='adivinhação'||cmd==='advinha'){gameMode='guess';secretNumber=Math.floor(Math.random()*5)+1;const m='Pensei em um número de 1 a 5! ("cancelar" para sair).';addMessage(m,'bot');addToMemory(input,m,'bot');saveState();return;}
            if(cmd==='dado'){const m=`Joguei o dado e saiu ${Math.floor(Math.random()*6)+1}! 🎲`;addMessage(m,'bot');addToMemory(input,m,'bot');saveState();return;}
            if(cmd==='cara ou coroa'||cmd==='moeda'){const m=`Deu ${Math.random()<0.5?'cara':'coroa'}! 🪙`;addMessage(m,'bot');addToMemory(input,m,'bot');saveState();return;}

            showTyping();

            const imgQ = extractImageQuery(input);
            const romanSingle = detectRomanQuery(input);
            const gen = detectGenerationRequest(input);

            if (imgQ && !romanSingle && !gen) {
                const img = await searchImage(imgQ);
                hideTyping();
                const m = img ? `🖼️ Imagem de "${imgQ}":` : `Não encontrei imagem de "${imgQ}". 😕`;
                addMessage(m,'bot',img||null);
                addToMemory(input,m,'bot');
                saveState();
                return;
            }

            const math = solveMath(input);
            if (math) { hideTyping(); addMessage(math,'bot'); addToMemory(input,math,'bot'); saveState(); return; }

            const local = findLocalResponse(input);
            if (local) {
                hideTyping();
                const isLong = local.length > 300;
                addMessage(local,'bot',null,isLong);
                addToMemory(input,local,'bot');
                const ni = normalize(input);
                if(ni.includes('roblox')) lastTopic='roblox';
                else if(ni.includes('brasil')) lastTopic='brasil';
                saveState();
                return;
            }

            const web = await smartWebSearch(input);
            hideTyping();
            const fm = web || 'Desculpe, não encontrei uma resposta para isso. 😕 Tente reformular ou verifique a ortografia.';
            const isLong = fm.length > 300;
            addMessage(fm,'bot',null,isLong);
            addToMemory(input,fm,'bot');
            const ni2 = normalize(input);
            if(ni2.includes('roblox')) lastTopic='roblox';
            else if(ni2.includes('brasil')) lastTopic='brasil';
            saveState();
        }

        // ==================== ABRIR/FECHAR ====================
        function openChat(){chatContainer.style.display='flex';floatBtn.style.display='none';userInput.focus();}
        function closeChat(){chatContainer.style.display='none';floatBtn.style.display='flex';saveState();}
        floatBtn.addEventListener('click',openChat);
        btnClose.addEventListener('click',closeChat);
        btnNew.addEventListener('click',()=>{chatMessages.innerHTML='';memory=[];lastTopic=null;internetCache={};gameMode=null;addMessage('⚡ <b>RANOX</b> – Novo chat. Pergunte algo!','bot');saveState();});
        sendBtn.addEventListener('click',()=>{processInput(userInput.value);userInput.value='';});
        userInput.addEventListener('keypress',e=>{if(e.key==='Enter'){processInput(userInput.value);userInput.value='';}});

        // ==================== ARRASTO ====================
        let isDragging=false,sX,sY,iX,iY;
        chatHeader.addEventListener('mousedown',e=>{if(e.target.tagName==='BUTTON')return;isDragging=true;const r=chatContainer.getBoundingClientRect();sX=e.clientX;sY=e.clientY;iX=r.left;iY=r.top;chatContainer.style.transition='none';});
        window.addEventListener('mousemove',e=>{if(!isDragging)return;chatContainer.style.left=Math.min(window.innerWidth-chatContainer.offsetWidth,Math.max(0,iX+e.clientX-sX))+'px';chatContainer.style.top=Math.min(window.innerHeight-chatContainer.offsetHeight,Math.max(0,iY+e.clientY-sY))+'px';chatContainer.style.transform='none';});
        window.addEventListener('mouseup',()=>{if(isDragging){isDragging=false;chatContainer.style.transition='';}});

        // ==================== INICIALIZAÇÃO ====================
        if(!loadState()) addMessage('⚡ <b>RANOX</b> ativado! Agora com múltiplos fallbacks de busca, conhecimento histórico expandido e muito mais! Teste: "Qual animal mais forte?", "História da Alemanha", "Top 20 animais"','bot');
        else chatMessages.scrollTop=chatMessages.scrollHeight;
        userInput.focus();
    })();
    </script>
</body>
  </html>
